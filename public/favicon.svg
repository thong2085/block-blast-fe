<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd4e8"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <!-- Shared top-highlight gradient for all blocks -->
    <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.48)"/>
      <stop offset="55%"  stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Shared bottom-shadow gradient -->
    <linearGradient id="sh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.22)"/>
    </linearGradient>
    <filter id="bs">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#7e0030" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Top-left glow shimmer -->
  <ellipse cx="175" cy="140" rx="148" ry="90" fill="rgba(255,255,255,0.18)"/>

  <!--
    3×3 block grid
    block = 118 × 118  |  gap = 16  |  edge offset = 63
    col x : 63 · 197 · 331
    row y : 63 · 197 · 331
    pattern:  ■ ■ ■   (row 0: all filled)
              ■ □ ■   (row 1: center empty)
              □ ■ □   (row 2: only center)
  -->

  <!-- ── ROW 0 ── -->
  <!-- (0,0) Hot pink -->
  <rect x="63"  y="63"  width="118" height="118" rx="20" fill="#e91e8c" filter="url(#bs)"/>
  <rect x="63"  y="63"  width="118" height="118" rx="20" fill="url(#hl)"/>
  <rect x="63"  y="63"  width="118" height="118" rx="20" fill="url(#sh)"/>

  <!-- (0,1) Purple -->
  <rect x="197" y="63"  width="118" height="118" rx="20" fill="#9333ea" filter="url(#bs)"/>
  <rect x="197" y="63"  width="118" height="118" rx="20" fill="url(#hl)"/>
  <rect x="197" y="63"  width="118" height="118" rx="20" fill="url(#sh)"/>

  <!-- (0,2) Teal -->
  <rect x="331" y="63"  width="118" height="118" rx="20" fill="#0d9488" filter="url(#bs)"/>
  <rect x="331" y="63"  width="118" height="118" rx="20" fill="url(#hl)"/>
  <rect x="331" y="63"  width="118" height="118" rx="20" fill="url(#sh)"/>

  <!-- ── ROW 1 ── -->
  <!-- (1,0) Orange -->
  <rect x="63"  y="197" width="118" height="118" rx="20" fill="#ea580c" filter="url(#bs)"/>
  <rect x="63"  y="197" width="118" height="118" rx="20" fill="url(#hl)"/>
  <rect x="63"  y="197" width="118" height="118" rx="20" fill="url(#sh)"/>

  <!-- (1,1) Empty cell -->
  <rect x="197" y="197" width="118" height="118" rx="20" fill="rgba(255,255,255,0.10)"/>

  <!-- (1,2) Blue -->
  <rect x="331" y="197" width="118" height="118" rx="20" fill="#2563eb" filter="url(#bs)"/>
  <rect x="331" y="197" width="118" height="118" rx="20" fill="url(#hl)"/>
  <rect x="331" y="197" width="118" height="118" rx="20" fill="url(#sh)"/>

  <!-- ── ROW 2 ── -->
  <!-- (2,0) Empty -->
  <rect x="63"  y="331" width="118" height="118" rx="20" fill="rgba(255,255,255,0.10)"/>

  <!-- (2,1) Yellow -->
  <rect x="197" y="331" width="118" height="118" rx="20" fill="#ca8a04" filter="url(#bs)"/>
  <rect x="197" y="331" width="118" height="118" rx="20" fill="url(#hl)"/>
  <rect x="197" y="331" width="118" height="118" rx="20" fill="url(#sh)"/>

  <!-- (2,2) Empty -->
  <rect x="331" y="331" width="118" height="118" rx="20" fill="rgba(255,255,255,0.10)"/>
</svg>
